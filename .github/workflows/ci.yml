name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_security_compliance:
        description: "Run optional security/compliance baseline job"
        required: false
        default: false
        type: boolean
      run_release_artifacts:
        description: "Build optional candidate CLI and Python release artifacts"
        required: false
        default: false
        type: boolean
      josim_command:
        description: "Optional override for the JoSIM command/path used by the Windows waveform gate"
        required: false
        default: ""
        type: string
      previous_summary_json:
        description: "Optional repo-relative approved baseline summary JSON for history diff generation"
        required: false
        default: ""
        type: string
      baseline_platform:
        description: "Platform key used to auto-stage a repo-tracked approved baseline when previous_summary_json is empty"
        required: false
        default: "windows"
        type: string
      validate_no_regression:
        description: "Fail when the current summary regresses relative to previous_summary_json"
        required: false
        default: true
        type: boolean
      regression_tolerance_v:
        description: "Allowed positive worst_max_abs_v drift during no-regression validation"
        required: false
        default: "0.0"
        type: string

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup shared CI environment
        uses: ./.github/actions/setup-rflux-ci

      - name: Rust tests
        run: |
          export PYO3_PYTHON="$(uv python find)"
          cargo test --workspace

      - name: Generate SAT and synth metric artifacts
        run: |
          export PYO3_PYTHON="$(uv python find)"
          cargo test -p rflux-sat --test dimacs_end_to_end -- --nocapture
          cargo test -p rflux-synth --test quaigh_alignment_fixtures -- --nocapture
          cargo test -p rflux-synth --test end_to_end_classic_examples -- --nocapture

      - name: Python tests
        run: uv run pytest

      - name: Diagnostics command smoke
        run: |
          export PYO3_PYTHON="$(uv python find)"
          cargo test -p rflux-cli run_collect_diagnostics_writes_manifest_and_copies_inputs -- --nocapture
          cargo test -p rflux-cli run_with_diagnostics_ -- --nocapture

      - name: PDK command smoke
        run: |
          export PYO3_PYTHON="$(uv python find)"
          cargo test -p rflux-cli run_pdk_validate_reports_ -- --nocapture

      - name: Phase 5 workflow smoke
        run: |
          uv run pytest python/tests/test_basic.py -k "merge_characterized_library_round_trip or optimize_design_with_characterized_library_workflow" -q

      - name: Waveform summary helper smoke
        run: |
          uv run pytest python/tests/test_waveform_compare_summary_utils.py -q

      - name: Waveform manifest runner smoke
        run: |
          uv run pytest python/tests/test_waveform_compare_manifest_runner.py -q

      - name: External warning helper smoke
        run: |
          uv run pytest python/tests/test_external_warning_manifest_runner.py -q
          uv run pytest python/tests/test_external_warning_summary_utils.py -q
          uv run pytest python/tests/test_prepare_external_warning_artifacts.py -q

      - name: Quaigh converter smoke
        run: |
          uv run pytest python/tests/test_quaigh_bench_converter.py -q

      - name: Security compliance exporter smoke
        run: |
          uv run pytest python/tests/test_security_compliance_utils.py -q

      - name: Release artifact helper smoke
        run: |
          uv run pytest python/tests/test_prepare_release_artifacts.py -q

      - name: Upload SAT and synth metric artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sat-and-synth-metrics
          if-no-files-found: error
          path: |
            target/dimacs_sat_metrics.csv
            target/quaigh_fixture_sat_metrics.csv

  waveform-compare-gate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup shared CI environment
        uses: ./.github/actions/setup-rflux-ci

      - name: Install JoSIM for Windows parity gate
        shell: pwsh
        run: |
          $version = 'v2.7'
          $archiveName = 'JoSIM-v2.7-windows-x64.zip'
          $downloadUrl = "https://github.com/JoeyDelp/JoSIM/releases/download/$version/$archiveName"
          $toolsDir = Join-Path $env:GITHUB_WORKSPACE 'tools'
          $archivePath = Join-Path $toolsDir $archiveName
          $installDir = Join-Path $toolsDir 'JoSIM-v2.7-windows-x64'
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          if (Test-Path $installDir) {
            Remove-Item -Recurse -Force $installDir
          }
          Expand-Archive -Path $archivePath -DestinationPath $toolsDir -Force
          $binaryPath = Join-Path $installDir 'bin\josim-cli.exe'
          if (-not (Test-Path $binaryPath)) {
            throw "Expected JoSIM binary at $binaryPath"
          }
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $installDir 'bin')

      - name: Resolve waveform gate settings
        shell: pwsh
        run: |
          $defaultJosimCommand = Join-Path $env:GITHUB_WORKSPACE 'tools\JoSIM-v2.7-windows-x64\bin\josim-cli.exe'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $josimCommand = if ('${{ inputs.josim_command }}') { '${{ inputs.josim_command }}' } else { $defaultJosimCommand }
            $previousSummaryJson = '${{ inputs.previous_summary_json }}'
            $baselinePlatform = '${{ inputs.baseline_platform }}'
            $validateNoRegression = '${{ inputs.validate_no_regression }}'
            $regressionTolerance = '${{ inputs.regression_tolerance_v }}'
          } else {
            $josimCommand = $defaultJosimCommand
            $previousSummaryJson = ''
            $baselinePlatform = 'windows'
            $validateNoRegression = 'true'
            $regressionTolerance = '0.0'
          }
          Add-Content -Path $env:GITHUB_ENV -Value "RFLOW_JOSIM_COMMAND=$josimCommand"
          Add-Content -Path $env:GITHUB_ENV -Value "RFLOW_PREVIOUS_SUMMARY_JSON=$previousSummaryJson"
          Add-Content -Path $env:GITHUB_ENV -Value "RFLOW_BASELINE_PLATFORM=$baselinePlatform"
          Add-Content -Path $env:GITHUB_ENV -Value "RFLOW_VALIDATE_NO_REGRESSION=$validateNoRegression"
          Add-Content -Path $env:GITHUB_ENV -Value "RFLOW_REGRESSION_TOLERANCE_V=$regressionTolerance"

      - name: Build Python extension
        run: uv run maturin develop -m crates/py/Cargo.toml

      - name: Run default external waveform compare manifest
        shell: pwsh
        run: |
          $compareArgs = @(
            'python/scripts/run_waveform_compare_manifest.py',
            '--josim-command', $env:RFLOW_JOSIM_COMMAND,
            '--result-dir', 'target/waveform-compare/results',
            '--baseline-platform', $env:RFLOW_BASELINE_PLATFORM,
            '--regression-tolerance-v', $env:RFLOW_REGRESSION_TOLERANCE_V,
            '--validate-pass'
          )
          if ($env:RFLOW_PREVIOUS_SUMMARY_JSON) {
            $compareArgs += @('--previous-summary-json', $env:RFLOW_PREVIOUS_SUMMARY_JSON)
          }
          if ($env:RFLOW_VALIDATE_NO_REGRESSION -eq 'true') {
            $compareArgs += '--validate-no-regression'
          }
          uv run python @compareArgs

      - name: Run default external warning manifest
        shell: pwsh
        run: |
          uv run python python/scripts/run_external_warning_manifest.py --josim-command "$env:RFLOW_JOSIM_COMMAND" --result-dir target/external-warning-manifest --validate-pass

      - name: Prepare waveform compare review artifacts
        shell: pwsh
        run: |
          $artifactArgs = @(
            'python/scripts/prepare_waveform_compare_artifacts.py',
            '--thresholds', 'python/tests/benchmarks/phase6/waveform_thresholds.json',
            '--benchmark-dir', 'python/tests/benchmarks/phase6',
            '--result-dir', 'target/waveform-compare/results',
            '--artifact-dir', 'target/waveform-compare',
            '--baseline-platform', $env:RFLOW_BASELINE_PLATFORM,
            '--regression-tolerance-v', $env:RFLOW_REGRESSION_TOLERANCE_V,
            '--josim-command', $env:RFLOW_JOSIM_COMMAND,
            '--github-workflow', '${{ github.workflow }}',
            '--github-job', 'waveform-compare-gate',
            '--github-event-name', '${{ github.event_name }}',
            '--github-run-id', '${{ github.run_id }}',
            '--github-run-attempt', '${{ github.run_attempt }}',
            '--github-sha', '${{ github.sha }}',
            '--github-ref-name', '${{ github.ref_name }}'
          )
          if ($env:RFLOW_PREVIOUS_SUMMARY_JSON) {
            $artifactArgs += @('--previous-summary-json', $env:RFLOW_PREVIOUS_SUMMARY_JSON)
          }
          if ($env:RFLOW_VALIDATE_NO_REGRESSION -eq 'true') {
            $artifactArgs += '--validate-no-regression'
          }
          uv run python @artifactArgs

      - name: Prepare external warning review artifacts
        shell: pwsh
        run: |
          uv run python python/scripts/prepare_external_warning_artifacts.py --result-dir target/external-warning-manifest --artifact-dir target/external-warning-review --josim-command "$env:RFLOW_JOSIM_COMMAND" --github-workflow "${{ github.workflow }}" --github-job "waveform-compare-gate" --github-event-name "${{ github.event_name }}" --github-run-id "${{ github.run_id }}" --github-run-attempt "${{ github.run_attempt }}" --github-sha "${{ github.sha }}" --github-ref-name "${{ github.ref_name }}"

      - name: Upload waveform compare artifacts
        uses: actions/upload-artifact@v4
        with:
          name: waveform-compare-results
          if-no-files-found: error
          path: |
            target/waveform-compare/results/*.compare.json
            target/waveform-compare/waveform_compare_summary.current.md
            target/waveform-compare/waveform_compare_summary.current.json
            target/waveform-compare/waveform_compare_summary.approved-baseline.json
            target/waveform-compare/waveform_compare_summary.candidate-baseline.md
            target/waveform-compare/waveform_compare_summary.candidate-baseline.json
            target/waveform-compare/waveform_compare_summary.validation.json
            target/waveform-compare/manifest.json
            target/waveform-compare/README.txt
            target/external-warning-review/*.warning.json
            target/external-warning-review/external_warning_summary.current.md
            target/external-warning-review/external_warning_summary.current.json
            target/external-warning-review/selected_external_warning_contracts.json
            target/external-warning-review/manifest.json
            target/external-warning-review/README.txt
            python/tests/benchmarks/phase6/waveform_thresholds.json

  security-compliance-optional:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_security_compliance }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup shared CI environment
        uses: ./.github/actions/setup-rflux-ci

      - name: Install compliance tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-license --locked

      - name: Generate compliance artifacts
        run: |
          uv run python python/scripts/prepare_security_compliance_artifacts.py \
            --output-dir target/compliance \
            --github-workflow "${{ github.workflow }}" \
            --github-job "security-compliance-optional" \
            --github-event-name "${{ github.event_name }}" \
            --github-run-id "${{ github.run_id }}" \
            --github-run-attempt "${{ github.run_attempt }}" \
            --github-sha "${{ github.sha }}" \
            --github-ref-name "${{ github.ref_name }}"

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-compliance-baseline
          if-no-files-found: error
          path: |
            target/compliance/rust-dependency-inventory.json
            target/compliance/rust-licenses.json
            target/compliance/python-dependency-inventory.json
            target/compliance/python-license-inventory.json
            target/compliance/cargo-audit.txt
            target/compliance/pyproject.toml
            target/compliance/uv.lock
            target/compliance/manifest.json
            target/compliance/README.txt

  release-artifacts-optional:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_release_artifacts }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup shared CI environment
        uses: ./.github/actions/setup-rflux-ci

      - name: Build candidate release artifacts
        run: |
          uv run python python/scripts/prepare_release_artifacts.py \
            --output-dir target/release-artifacts \
            --github-workflow "${{ github.workflow }}" \
            --github-job "release-artifacts-optional" \
            --github-event-name "${{ github.event_name }}" \
            --github-run-id "${{ github.run_id }}" \
            --github-run-attempt "${{ github.run_attempt }}" \
            --github-sha "${{ github.sha }}" \
            --github-ref-name "${{ github.ref_name }}"

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-artifacts
          if-no-files-found: error
          path: |
            target/release-artifacts/bin/**
            target/release-artifacts/wheels/**
            target/release-artifacts/README.md
            target/release-artifacts/Cargo.toml
            target/release-artifacts/pyproject.toml
            target/release-artifacts/uv.lock
            target/release-artifacts/README.txt
            target/release-artifacts/manifest.json

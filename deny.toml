# rflux workspace-level cargo-deny configuration

[advisories]
vulnerability = "deny"
unmaintained = "deny"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "MIT OR Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
    "Zope",
]
default = "deny"
confidence = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = [
    # criterion pulls in old versions of several dependencies
    { name = "criterion", version = "0.5" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
